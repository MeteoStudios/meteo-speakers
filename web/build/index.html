<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meteo Speakers</title>
    <link rel="stylesheet" href="index-38fe7224.css">
</head>
<body>

<div class="bb-wrapper" id="bb-wrapper" style="display:none;">
    <div class="bb-panel">

        <div class="bb-header">
            <div class="bb-header-left">
                <svg class="bb-header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="4" y="2" width="16" height="20" rx="2"/><circle cx="12" cy="14" r="4"/><line x1="12" y1="6" x2="12.01" y2="6"/>
                </svg>
                <span class="bb-title" id="bb-title">SPEAKER</span>
            </div>
            <button class="bb-close" id="bb-close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>

        <div class="bb-now-playing">
            <div class="bb-viz" id="bb-viz">
                <div class="bb-viz-bar"></div>
                <div class="bb-viz-bar"></div>
                <div class="bb-viz-bar"></div>
                <div class="bb-viz-bar"></div>
                <div class="bb-viz-bar"></div>
            </div>
            <div class="bb-track-info">
                <div class="bb-track-name" id="bb-track-name">No Music</div>
                <div class="bb-track-status" id="bb-track-status">Stopped</div>
            </div>
        </div>

        <div class="bb-progress" id="bb-progress" style="display:none;">
            <div class="bb-time-row">
                <span class="bb-time-current" id="bb-time-current">0:00</span>
                <span class="bb-time-duration" id="bb-time-duration">0:00</span>
            </div>
            <div class="bb-seek-wrap">
                <input type="range" class="bb-seek-slider" id="bb-seek-slider" min="0" max="100" value="0" step="0.1">
            </div>
        </div>

        <div class="bb-url-section" id="bb-url-section">
            <div class="bb-input-row">
                <input type="text" class="bb-url-input" id="bb-url-input" placeholder="Enter URL..." spellcheck="false" autocomplete="off">
                <button class="bb-play-btn" id="bb-play-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="6,4 20,12 6,20"/></svg>
                </button>
            </div>
        </div>

        <div class="bb-controls" id="bb-controls">
            <button class="bb-ctrl" id="bb-pause">
                <svg id="bb-pause-icon" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
            </button>
            <button class="bb-ctrl" id="bb-stop">
                <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg>
            </button>
            <button class="bb-ctrl" id="bb-mute">
                <svg id="bb-mute-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11,5 6,9 2,9 2,15 6,15 11,19" fill="currentColor" stroke="none"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg>
            </button>
            <div class="bb-vol-wrap">
                <input type="range" class="bb-vol-slider" id="bb-vol-slider" min="0" max="100" value="50">
                <span class="bb-vol-label" id="bb-vol-label">50%</span>
            </div>
        </div>

        <div class="bb-recent" id="bb-recent">
            <div class="bb-recent-header">
                <span class="bb-recent-title" id="bb-recent-title">Recently Played</span>
                <button class="bb-clear" id="bb-clear">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
                </button>
            </div>
            <div class="bb-recent-list" id="bb-recent-list">
                <div class="bb-empty" id="bb-empty">No recent tracks</div>
            </div>
        </div>

        <div class="bb-lock-overlay" id="bb-lock-overlay" style="display:none;">
            <div class="bb-lock-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12.55a11 11 0 0 1 14 0"/>
                    <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
                    <line x1="12" y1="20" x2="12.01" y2="20"/>
                </svg><!-- https://meteofivem.net/ -->
            </div>
            <div class="bb-lock-title" id="bb-lock-title">Casting from Music app</div>
            <div class="bb-lock-song" id="bb-lock-song"></div>
            <div class="bb-lock-driver" id="bb-lock-driver"></div>
            <button class="bb-lock-disconnect" id="bb-lock-disconnect" style="display:none;">Disconnect</button>
        </div>

    </div>
</div>
    <script src="index-0222c2ff.js"></script>
</body>
</html>
